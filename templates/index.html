{% extends 'base.html' %}

{% block content %}
    
    <div style="display: flex; flex-direction: column; align-items: center; height: 50vh; justify-content: center;">
        <h1 id="search-title">{% block title %} Go ahead, search the weather {% endblock %}</h1>
        <button 
            id="fetch-btn"
            style="margin-top: 20px; padding: 10px 20px; border-radius: 8px; border: none; background-color: green; color: white; cursor: pointer;">
            Fetch Weather
        </button>
    </div>

    <!-- Forecast renders here -->
    <div id="forecast-results" style="display: none; padding: 0 2rem 2rem;">
        <h2 id="forecast-location" style="margin-bottom: 1rem;"></h2>
        <div id="forecast-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;"></div>
    </div>

    <script>
        async function initAutocomplete() {
            await google.maps.importLibrary("places");

            const { PlaceAutocompleteElement } = google.maps.places;

            const placeAutocomplete = new PlaceAutocompleteElement();
            placeAutocomplete.style = "width: 425px; margin-top: 20px; background-color: white; color: black";
            placeAutocomplete.placeholder = 'Search for a place...';

            const title = document.getElementById("search-title");
            title.after(placeAutocomplete);

            let selectedLat  = null;
            let selectedLng = null;

            placeAutocomplete.addEventListener("gmp-select", async (event) => {
                const place = event.placePrediction.toPlace();
                await place.fetchFields({ fields: ["displayName", "formattedAddress", "location"] });
                const placeJSON = place.toJSON();
                const lat = placeJSON.location.lat;
                const lng = placeJSON.location.lng;
                // console.log("Selected:", lat, lng);

                selectedLat = lat;
                selectedLng = lng;

            });

            function renderForecast(periods) {
                const grid = document.getElementById("forecast-grid");
                grid.innerHTML = periods.map(p => {
                    const precip = p.probabilityOfPrecipitation.value || 0;
                    return `
                        <div style="background: ${p.isDaytime ? 'white' : '#f8f8f8'}; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 12px; display: flex; flex-direction: column; gap: 6px;">
                            <div style="font-size: 13px; font-weight: 500;">${p.name}</div>
                            <img src="${p.icon}" style="width: 48px; height: 48px;">
                            <div>
                                <span style="font-size: 26px; font-weight: 500;">${p.temperature}</span>
                                <span style="font-size: 13px; color: #64748b;">°${p.temperatureUnit}</span>
                            </div>
                            <div style="font-size: 12px; color: #64748b;">${p.shortForecast}</div>
                            <div style="font-size: 11px; color: #94a3b8;">${p.windSpeed} ${p.windDirection}</div>
                            <span style="font-size: 11px; padding: 2px 8px; border-radius: 99px; background: ${precip >= 40 ? '#eff6ff' : '#f1f5f9'}; color: ${precip >= 40 ? '#1d4ed8' : '#94a3b8'}; width: fit-content;">
                                ${precip}% rain
                            </span>
                        </div>
                    `;
            }).join("");

            document.getElementById("forecast-results").style.display = "block";
        }


            document.getElementById("fetch-btn").addEventListener("click", async() => {
                if(!selectedLat || !selectedLng){
                    alert("Select a location to get started");
                    return;
                }
                
                // send to flask
                const response = await fetch("/forecast", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ lat : selectedLat, lng : selectedLng})
                });

                const forecast = await response.json();
                // console.log(forecast.data);
                // console.log("Forecast:", forecast.data);
                const periods = forecast.data.periods;
                if(forecast){ renderForecast(periods); };

            });


        }  

    </script>
    <!-- Load the Places API -->
    <script>
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.googleapis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})
        ({key: "{{ google_api_key }}", v: "weekly", callback: "initAutocomplete", libraries: "places"});
    </script>

{% endblock %}
