<!doctype html>
<html>
  <head>
    <meta
      name="generator"
      content="HTML Tidy for Mac OS X (vers 31 October 2006 - Apple Inc. build 11418), see www.w3.org"
    />
    <title></title>
  </head>
  <body>
    {% extends 'base.html' %} {% block content %}

    <div
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 50vh;
        justify-content: center;
      "
    >
      <h1 id="search-title">
        {% block title %} Go ahead — <strong>search the weather.</strong>
        <br />Just keep it in the US. {% endblock %}
      </h1>

      <div class="btn-container">
        <button id="fetch-btn" class="btn">Search</button>
        <button id="create-alert" class="btn">Create Alert</button>
      </div>
    </div>

    <!-- spinner renders here -->
    <img src="/static/img/pulse-3.svg" id="spinner" name="spinner" />

    <!-- AI summary renders here -->
    <div id="ai-summary"></div>

    <!-- Forecast renders here -->
    <div id="forecast-results">
      <h2 id="forecast-location"></h2>
      <div id="forecast-grid"></div>
    </div>

    <script type="text/javascript">
      async function initAutocomplete() {
        await google.maps.importLibrary("places");

        const { PlaceAutocompleteElement } = google.maps.places;

        const placeAutocomplete = new PlaceAutocompleteElement();
        placeAutocomplete.style =
          "width: min(425px, 90%); margin-top: 20px; background-color: white; color: black; border-radius: 20px";
        placeAutocomplete.placeholder = "Search for a place...";

        const title = document.getElementById("search-title");
        title.after(placeAutocomplete);

        let selectedLat = null;
        let selectedLng = null;

        placeAutocomplete.addEventListener("gmp-select", async (event) => {
          const place = event.placePrediction.toPlace();
          await place.fetchFields({
            fields: ["displayName", "formattedAddress", "location"],
          });
          const placeJSON = place.toJSON();
          selectedLat = placeJSON.location.lat;
          selectedLng = placeJSON.location.lng;
        });

        function renderSummary(summary) {
          const aiSummary = document.getElementById("ai-summary");
          aiSummary.innerHTML = `
            <div style="display: flex; align-items: flex-start; gap: 10px;">
              <img src="/static/img/sparkle.svg" style="width: 24px; height: 24px; flex-shrink: 0;">
              <p style="margin: 0;">${summary}<\/p>
            <\/div>
          `;
          aiSummary.style.display = "block";
        }

        function renderForecast(periods) {
          const grid = document.getElementById("forecast-grid");
          grid.innerHTML = periods
            .map((p) => {
              const precip = p.probabilityOfPrecipitation.value || 0;
              return `
                <div class="forecast-card ${p.isDaytime ? "forecast-card--day" : "forecast-card--night"}">
                  <div class="forecast-card__name">${p.name}<\/div>
                  <img src="${p.icon}" class="forecast-card__icon">
                  <div>
                    <span class="forecast-card__temp">${p.temperature}<\/span>
                    <span class="forecast-card__temp-unit">°${p.temperatureUnit}<\/span>
                  <\/div>
                  <div class="forecast-card__desc">${p.shortForecast}<\/div>
                  <div class="forecast-card__wind">${p.windSpeed} ${p.windDirection}<\/div>
                  <span class="forecast-card__rain ${precip >= 40 ? "forecast-card__rain--high" : "forecast-card__rain--low"}">
                    ${precip}% rain
                  <\/span>
                <\/div>
              `;
            })
            .join("");
          document.getElementById("forecast-results").style.display = "block";
        }

        document
          .getElementById("fetch-btn")
          .addEventListener("click", async () => {
            let forecast = null;

            if (!selectedLat || !selectedLng) {
              alert("Select a location to get started");
              return;
            }

            document.getElementById("spinner").style.display = "block";

            try {
              const forecastRes = await fetch("/forecast", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ lat: selectedLat, lng: selectedLng }),
              });

              forecast = await forecastRes.json();

              if (forecast.data.periods) {
                renderForecast(forecast.data.periods);
              }
            } finally {
              document.getElementById("spinner").style.display = "none";
            }

            const summaryRes = await fetch("/summary", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(forecast.data),
            });
            const summaryData = await summaryRes.json();
            if (summaryData.summary) {
              renderSummary(summaryData.summary);
            }
          });
      }
    </script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key={{ google_api_key }}&libraries=places&v=weekly&callback=initAutocomplete"
      async
      defer
      type="text/javascript"
    ></script>
    {% endblock %}
  </body>
</html>
