<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">

<html>
  <head>
    <meta
      name="generator"
      content="HTML Tidy for Mac OS X (vers 31 October 2006 - Apple Inc. build 11418), see www.w3.org"
    />
    <link rel="stylesheet" href="/static/css/style.css" type="text/css" />

    <title></title>
  </head>

  <body>
    {% extends 'base.html' %} {% block content %}

    <h1>{% block title %} Login In {% endblock %}</h1>

    <form method="post">
      <div class="form-group">
        <label for="usrEmail">Email</label>
        <input
          type="email"
          name="usrEmail"
          placeholder="weather@mail.com"
          class="form-control"
          value="{{ request.form['usrEmail'] }}"
          required=""
        />
      </div>
      {% if emailError %}

      <p>{{ emailError }}</p>
      {% endif %}

      <div class="form-group">
        <label for="usrPass">Password</label>
        <input
          type="password"
          name="usrPass"
          placeholder="password"
          class="form-control"
          value="{{ request.form['usrPass'] }}"
          required=""
        />
      </div>
      {% if passError %}

      <p>{{ passError }}</p>
      {% endif %}

      <div class="form-group">
        <div class="btn-container">
          <button id="login-btn" type="submit" class="btn">Login</button>
        </div>
      </div>
      <a href="{{url_for('signup')}}" class="d-block mt-2"
        >Don't have an account? Sign up</a
      >
    </form>
    {% endblock %}
  </body>
</html>
